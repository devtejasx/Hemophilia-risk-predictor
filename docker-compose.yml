version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hemophilia-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=hemophilia_clinic.db
      - SECRET_KEY=your-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - LOG_LEVEL=INFO
    volumes:
      - ./hemophilia_clinic.db:/app/hemophilia_clinic.db
      - ./models:/app/models
    depends_on:
      - db
    networks:
      - hemophilia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (Streamlit) Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hemophilia-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    depends_on:
      - backend
    networks:
      - hemophilia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # SQLite Database Service (optional, for persistence)
  db:
    image: alpine:latest
    container_name: hemophilia-db
    volumes:
      - db-volume:/data
    networks:
      - hemophilia-network
    restart: unless-stopped

networks:
  hemophilia-network:
    driver: bridge

volumes:
  db-volume:
