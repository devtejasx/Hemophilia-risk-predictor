services:
  - type: web
    name: hemophilia-clinician-ai
    runtime: python-3.11.9
    buildCommand: "bash build.sh"
    startCommand: "streamlit run app.py --server.port=$PORT --server.headless=true --server.enableCORS=false"
    envVars:
      - key: OPENAI_API_KEY
        scope: build
      - key: OPENAI_API_KEY
        scope: runtime
    routes:
      - type: http
        path: /

