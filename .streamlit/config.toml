[theme]
primaryColor = "#0085FF"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1c1f26"
textColor = "#ffffff"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[server]
maxUploadSize = 200
enableXsrfProtection = true
headless = true

[logger]
level = "error"


